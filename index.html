<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cig & Phone — Choisissez votre boutique</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--g:#00ff00;--gg:rgba(0,255,0,.35);--dc:#121214;}
html,body{height:100%;overflow:hidden;}
body{background:var(--dc);color:#fff;font-family:'Poppins',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.grid{position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,0,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,0,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.scanline{position:fixed;top:0;left:0;width:100%;height:4px;background:linear-gradient(to right,transparent,var(--g),transparent);box-shadow:0 0 14px var(--g);animation:scan 7s linear infinite;opacity:.55;z-index:0;}
.top{position:relative;z-index:10;text-align:center;margin-bottom:20px;}
.top img{width:280px;max-width:75vw;}
.top h1{font-size:clamp(13px,2vw,17px);font-weight:600;color:#888;letter-spacing:3px;text-transform:uppercase;margin-top:8px;}
.top h1 span{color:var(--g);text-shadow:0 0 10px var(--g);}
.scene{position:relative;z-index:10;width:min(900px,96vw);height:min(560px,65vh);perspective:1400px;cursor:grab;}
.scene:active{cursor:grabbing;}
.wheel{width:100%;height:100%;position:relative;transform-style:preserve-3d;animation:autoSpin 22s linear infinite;}
.hub-wrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) translateZ(0px);width:190px;height:230px;pointer-events:none;}
#hub-canvas{width:100%;height:100%;display:block;filter:drop-shadow(0 0 10px #00ff00) drop-shadow(0 0 24px rgba(0,255,0,0.4));}
.card{position:absolute;width:clamp(240px,28vw,320px);height:clamp(340px,48vh,460px);top:50%;left:50%;border-radius:24px;overflow:hidden;border:2px solid #2a2a2a;transition:border-color .3s,box-shadow .3s;text-decoration:none;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:28px 22px;background-size:cover;background-position:center;}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9) 30%,rgba(0,0,0,.15));z-index:1;}
.card:hover{border-color:var(--g);box-shadow:0 0 45px var(--gg);}
.card-1{transform:translate(-50%,-50%) rotateY(0deg)   translateZ(clamp(260px,30vw,360px));}
.card-2{transform:translate(-50%,-50%) rotateY(120deg) translateZ(clamp(260px,30vw,360px));}
.card-3{transform:translate(-50%,-50%) rotateY(240deg) translateZ(clamp(260px,30vw,360px));}
.card-1{background-image:url('cig--phone-pornic-reparationtelephone.jpg');}
.card-2{background-image:url('20260520_184840.jpg');}
.card-3{background-image:url('atelier.jpeg');}
.card-inner{position:relative;z-index:2;text-align:center;width:100%;}
.card-inner h2{font-size:clamp(18px,2.2vw,24px);font-weight:800;text-transform:uppercase;color:#fff;line-height:1.2;text-shadow:0 2px 10px rgba(0,0,0,.9);}
.card-inner .city{font-size:13px;color:#bbb;margin-top:6px;letter-spacing:1px;}
.card-inner .btn-go{display:inline-block;margin-top:16px;background:var(--g);color:#000;font-size:13px;font-weight:800;padding:10px 28px;border-radius:30px;text-transform:uppercase;letter-spacing:2px;box-shadow:0 0 18px var(--gg);transition:transform .2s,box-shadow .2s;}
.card:hover .btn-go{transform:scale(1.07);box-shadow:0 0 30px var(--g);}
.hint{position:relative;z-index:10;margin-top:18px;font-size:12px;color:#555;letter-spacing:2px;text-transform:uppercase;animation:blink 2.5s infinite;}
@keyframes scan{0%{top:0}50%{top:100%}100%{top:0}}
@keyframes autoSpin{from{transform:rotateY(0deg)}to{transform:rotateY(360deg)}}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
@media(max-width:600px){
  .card{width:180px;height:280px;padding:18px 14px;}
  .card-1{transform:translate(-50%,-50%) rotateY(0deg)   translateZ(200px);}
  .card-2{transform:translate(-50%,-50%) rotateY(120deg) translateZ(200px);}
  .card-3{transform:translate(-50%,-50%) rotateY(240deg) translateZ(200px);}
  .card-inner h2{font-size:15px;}
  .hub-wrap{width:130px;height:160px;}
  .scene{height:58vh;}
  .top img{width:200px;}
}
</style>
</head>
<body>
<div class="grid"></div>
<div class="scanline"></div>
<div class="top">
  <img src="cigandphone-pornic (3).png" alt="Logo">
  <h1>Choisissez votre <span>boutique</span></h1>
</div>
<div class="scene" id="scene">
  <div class="wheel" id="wheel">
    <div class="hub-wrap"><canvas id="hub-canvas"></canvas></div>
    <a href="transition.html?to=cigphone" class="card card-1">
      <div class="card-inner">
        <h2>Cig &amp; Phone</h2>
        <div class="city">📍 Pornic (44210)</div>
        <span class="btn-go">Y aller →</span>
      </div>
    </a>
    <a href="transition.html?to=sosinfo" class="card card-2">
      <div class="card-inner">
        <h2>SOS Info.Mobile</h2>
        <div class="city">📍 Saint-Philbert-de-Grand-Lieu (44310)</div>
        <span class="btn-go">Y aller →</span>
      </div>
    </a>
    <a href="transition.html?to=smartelier" class="card card-3">
      <div class="card-inner">
        <h2>Le Smart'elier</h2>
        <div class="city">📍 Machecoul-Saint-Même (44270)</div>
        <span class="btn-go">Y aller →</span>
      </div>
    </a>
  </div>
</div>
<p class="hint">↔ Faites tourner • Molette • Cliquez pour entrer</p>

<script>
/* === ROUE === */
const wheel = document.getElementById('wheel');
let drag=false, lastX=0, curAngle=0, vel=0, raf;

function readAngle(){
  const m=(wheel.style.transform||'').match(/rotateY\(([-\d.]+)deg\)/);
  return m ? parseFloat(m[1]) : 0;
}
function applyAngle(a){
  wheel.style.transform = `rotateY(${a}deg)`;
}
function startDrag(x){drag=true;lastX=x;curAngle=readAngle();vel=0;cancelAnimationFrame(raf);wheel.style.animation='none';}
function moveDrag(x){if(!drag)return;const dx=x-lastX;vel=dx*.5;curAngle+=dx*.38;applyAngle(curAngle);lastX=x;}
function endDrag(){if(!drag)return;drag=false;inertia();}
function inertia(){if(Math.abs(vel)<.05)return;vel*=.96;curAngle+=vel;applyAngle(curAngle);raf=requestAnimationFrame(inertia);}

/* Molette souris */
document.addEventListener('wheel', e => {
  e.preventDefault();
  wheel.style.animation = 'none';
  cancelAnimationFrame(raf);
  curAngle = readAngle();
  vel = -e.deltaY * 0.3;
  curAngle += vel;
  applyAngle(curAngle);
  inertia();
}, { passive: false });

wheel.addEventListener('mousedown', e=>startDrag(e.clientX));
document.addEventListener('mousemove', e=>moveDrag(e.clientX));
document.addEventListener('mouseup', endDrag);
wheel.addEventListener('touchstart', e=>startDrag(e.touches[0].clientX), {passive:true});
document.addEventListener('touchmove', e=>moveDrag(e.touches[0].clientX), {passive:true});
document.addEventListener('touchend', endDrag);

/* === SMARTPHONE THREE.JS === */
(function(){
  const canvas=document.getElementById('hub-canvas');
  const W=canvas.offsetWidth||190, H=canvas.offsetHeight||230;
  canvas.width=W*devicePixelRatio; canvas.height=H*devicePixelRatio;
  const renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
  renderer.setPixelRatio(devicePixelRatio); renderer.setSize(W,H); renderer.setClearColor(0x000000,0);
  const scene3=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(38,W/H,0.1,100);
  camera.position.set(0,0,3.8);
  const G=0x00ff00;
  const mW=new THREE.MeshBasicMaterial({color:G,wireframe:true,transparent:true,opacity:0.45});
  const mE=new THREE.LineBasicMaterial({color:G,transparent:true,opacity:0.9});
  const mF=new THREE.MeshBasicMaterial({color:G,transparent:true,opacity:0.05,side:THREE.FrontSide});
  const mS=new THREE.MeshBasicMaterial({color:0x001800,transparent:true,opacity:0.82});
  const mL=new THREE.LineBasicMaterial({color:G,transparent:true,opacity:0.2});
  const mR=new THREE.MeshBasicMaterial({color:G,transparent:true,opacity:0.28});
  const mD=new THREE.MeshBasicMaterial({color:G});
  const phone=new THREE.Group(); scene3.add(phone);
  const bGeo=new THREE.BoxGeometry(0.55,1.1,0.07,4,8,2);
  phone.add(new THREE.Mesh(bGeo,mF),new THREE.Mesh(bGeo,mW),new THREE.LineSegments(new THREE.EdgesGeometry(bGeo),mE));
  const scr=new THREE.Mesh(new THREE.PlaneGeometry(0.38,0.62,2,4),mS); scr.position.set(0,0.08,0.037); phone.add(scr);
  const lp=[]; for(let i=0;i<10;i++){const y=-0.26+i*(0.58/9);lp.push(new THREE.Vector3(-0.18,y,0.038),new THREE.Vector3(0.18,y,0.038));}
  phone.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(lp),mL));
  const notch=new THREE.Mesh(new THREE.CylinderGeometry(0.032,0.032,0.012,10),new THREE.MeshBasicMaterial({color:G,transparent:true,opacity:0.7}));
  notch.rotation.x=Math.PI/2; notch.position.set(0,0.47,0.038); phone.add(notch);
  const home=new THREE.Mesh(new THREE.RingGeometry(0.038,0.062,16),new THREE.MeshBasicMaterial({color:G,transparent:true,opacity:0.55,side:THREE.DoubleSide}));
  home.position.set(0,-0.44,0.038); phone.add(home);
  const ring1=new THREE.Mesh(new THREE.TorusGeometry(0.72,0.008,6,55),mR); ring1.rotation.x=Math.PI/2;
  const ring2=new THREE.Mesh(new THREE.TorusGeometry(0.72,0.006,6,55),mR.clone()); ring2.material.opacity=0.15; ring2.rotation.set(Math.PI/3,0,Math.PI/5);
  scene3.add(ring1,ring2);
  const d1=new THREE.Mesh(new THREE.SphereGeometry(0.034,8,8),mD);
  const d2=new THREE.Mesh(new THREE.SphereGeometry(0.025,8,8),mD.clone());
  scene3.add(d1,d2);
  let t=0;
  (function animate(){
    requestAnimationFrame(animate); t+=0.012;
    phone.rotation.y=t*0.7; phone.rotation.x=Math.sin(t*0.31)*0.32; phone.rotation.z=Math.sin(t*0.19)*0.09;
    ring1.rotation.z=t*0.38; ring2.rotation.y=t*0.52;
    d1.position.set(Math.cos(t*0.8)*0.72,Math.sin(t*0.8)*0.1,Math.sin(t*0.8)*0.72);
    d2.position.set(Math.cos(t*0.55+Math.PI)*0.72*Math.cos(Math.PI/3),Math.sin(t*0.55+Math.PI)*0.72,Math.cos(t*0.55+Math.PI)*0.72*Math.sin(Math.PI/3));
    const p=0.5+0.5*Math.sin(t*1.8);
    mW.opacity=0.3+0.18*p; mE.opacity=0.65+0.25*p; ring1.material.opacity=0.18+0.14*p; mL.opacity=0.12+0.1*p;
    renderer.render(scene3,camera);
  })();
})();
</script>
</body>
</html>
