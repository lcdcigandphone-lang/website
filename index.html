<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cig & Phone — Choisissez votre boutique</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--g:#00ff00;--gg:rgba(0,255,0,.35);--dc:#121214;}
html,body{height:100%;overflow:hidden;}
body{background:var(--dc);color:#fff;font-family:'Poppins',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.grid{position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,0,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,0,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.scanline{position:fixed;top:0;left:0;width:100%;height:4px;background:linear-gradient(to right,transparent,var(--g),transparent);box-shadow:0 0 14px var(--g);animation:scan 7s linear infinite;opacity:.55;z-index:0;}
.top{position:relative;z-index:10;text-align:center;margin-bottom:20px;}
.top img{width:280px;max-width:75vw;}
.top h1{font-size:clamp(13px,2vw,17px);font-weight:600;color:#888;letter-spacing:3px;text-transform:uppercase;margin-top:8px;}
.top h1 span{color:var(--g);text-shadow:0 0 10px var(--g);}
.scene{position:relative;z-index:10;width:min(900px,96vw);height:min(560px,65vh);perspective:1400px;cursor:grab;}
.scene:active{cursor:grabbing;}
.wheel{width:100%;height:100%;position:relative;transform-style:preserve-3d;animation:autoSpin 22s linear infinite;}
.card{position:absolute;width:clamp(240px,28vw,320px);height:clamp(340px,48vh,460px);top:50%;left:50%;border-radius:24px;overflow:hidden;border:2px solid #2a2a2a;transition:border-color .3s,box-shadow .3s;text-decoration:none;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:28px 22px;background-size:cover;background-position:center;}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9) 30%,rgba(0,0,0,.15));z-index:1;}
.card:hover{border-color:var(--g);box-shadow:0 0 45px var(--gg);}
.card-1{transform:translate(-50%,-50%) rotateY(0deg)   translateZ(clamp(260px,30vw,360px));}
.card-2{transform:translate(-50%,-50%) rotateY(120deg) translateZ(clamp(260px,30vw,360px));}
.card-3{transform:translate(-50%,-50%) rotateY(240deg) translateZ(clamp(260px,30vw,360px));}
.card-1{background-image:url('cig--phone-pornic-reparationtelephone.jpg');}
.card-2{background-image:url('20260520_184840.jpg');}
.card-3{background-image:url('atelier.jpeg');}
.card-inner{position:relative;z-index:2;text-align:center;width:100%;}
.card-inner h2{font-size:clamp(18px,2.2vw,24px);font-weight:800;text-transform:uppercase;color:#fff;line-height:1.2;text-shadow:0 2px 10px rgba(0,0,0,.9);}
.card-inner .city{font-size:13px;color:#bbb;margin-top:6px;letter-spacing:1px;}
.card-inner .btn-go{display:inline-block;margin-top:16px;background:var(--g);color:#000;font-size:13px;font-weight:800;padding:10px 28px;border-radius:30px;text-transform:uppercase;letter-spacing:2px;box-shadow:0 0 18px var(--gg);transition:transform .2s,box-shadow .2s;}
.card:hover .btn-go{transform:scale(1.07);box-shadow:0 0 30px var(--g);}

/* HUB Three.js — positionné dans .scene, hors du .wheel */
#hub-canvas{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:110px;height:110px;
  z-index:30;
  pointer-events:none;
  border-radius:50%;
  /* Glow externe CSS */
  filter:drop-shadow(0 0 12px #00ff00) drop-shadow(0 0 28px rgba(0,255,0,0.4));
}

.hint{position:relative;z-index:10;margin-top:18px;font-size:12px;color:#555;letter-spacing:2px;text-transform:uppercase;animation:blink 2.5s infinite;}
@keyframes scan{0%{top:0}50%{top:100%}100%{top:0}}
@keyframes autoSpin{from{transform:rotateY(0deg)}to{transform:rotateY(360deg)}}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
@media(max-width:600px){
  .card{width:180px;height:280px;padding:18px 14px;}
  .card-1{transform:translate(-50%,-50%) rotateY(0deg)   translateZ(200px);}
  .card-2{transform:translate(-50%,-50%) rotateY(120deg) translateZ(200px);}
  .card-3{transform:translate(-50%,-50%) rotateY(240deg) translateZ(200px);}
  .card-inner h2{font-size:15px;}
  #hub-canvas{width:80px;height:80px;}
  .scene{height:58vh;}
  .top img{width:200px;}
}
</style>
</head>
<body>
<div class="grid"></div>
<div class="scanline"></div>
<div class="top">
  <img src="cigandphone-pornic (3).png" alt="Logo">
  <h1>Choisissez votre <span>boutique</span></h1>
</div>

<div class="scene" id="scene">
  <div class="wheel" id="wheel">
    <a href="transition.html?to=cigphone" class="card card-1">
      <div class="card-inner">
        <h2>Cig &amp; Phone</h2>
        <div class="city">📍 Pornic (44210)</div>
        <span class="btn-go">Y aller →</span>
      </div>
    </a>
    <a href="transition.html?to=sosinfo" class="card card-2">
      <div class="card-inner">
        <h2>SOS Info.Mobile</h2>
        <div class="city">📍 Saint-Philbert-de-Grand-Lieu (44310)</div>
        <span class="btn-go">Y aller →</span>
      </div>
    </a>
    <a href="transition.html?to=smartelier" class="card card-3">
      <div class="card-inner">
        <h2>Le Smart'elier</h2>
        <div class="city">📍 Machecoul-Saint-Même (44270)</div>
        <span class="btn-go">Y aller →</span>
      </div>
    </a>
  </div>

  <!-- Canvas Three.js HORS du wheel — indépendant -->
  <canvas id="hub-canvas"></canvas>
</div>

<p class="hint">↔ Faites tourner • Cliquez pour entrer</p>

<script>
/* ====================================================
   ROUE DE SELECTION
====================================================*/
const wheel=document.getElementById('wheel');
let drag=false,lastX=0,curAngle=0,vel=0,raf;
function readAngle(){const m=(wheel.style.transform||'').match(/rotateY\(([-\d.]+)deg\)/);return m?parseFloat(m[1]):0;}
function startDrag(x){drag=true;lastX=x;curAngle=readAngle();vel=0;cancelAnimationFrame(raf);wheel.style.animation='none';}
function moveDrag(x){if(!drag)return;const dx=x-lastX;vel=dx*.5;curAngle+=dx*.38;wheel.style.transform=`rotateY(${curAngle}deg)`;lastX=x;}
function endDrag(){if(!drag)return;drag=false;inertia();}
function inertia(){if(Math.abs(vel)<.05)return;vel*=.96;curAngle+=vel;wheel.style.transform=`rotateY(${curAngle}deg)`;raf=requestAnimationFrame(inertia);}
wheel.addEventListener('mousedown',e=>startDrag(e.clientX));
document.addEventListener('mousemove',e=>moveDrag(e.clientX));
document.addEventListener('mouseup',endDrag);
wheel.addEventListener('touchstart',e=>startDrag(e.touches[0].clientX),{passive:true});
document.addEventListener('touchmove',e=>moveDrag(e.touches[0].clientX),{passive:true});
document.addEventListener('touchend',endDrag);

/* ====================================================
   SMARTPHONE THREE.JS HOLOGRAMME
====================================================*/
(function(){
  const canvas = document.getElementById('hub-canvas');
  const W = canvas.offsetWidth  || 110;
  const H = canvas.offsetHeight || 110;
  canvas.width  = W * window.devicePixelRatio;
  canvas.height = H * window.devicePixelRatio;

  const renderer = new THREE.WebGLRenderer({canvas, alpha:true, antialias:true});
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(W, H);
  renderer.setClearColor(0x000000, 0);

  const scene3 = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(38, W/H, 0.1, 100);
  camera.position.set(0, 0, 3.8);

  const GREEN  = 0x00ff00;
  const GREEN2 = 0x00cc44;

  /* --- Matériaux hologramme --- */
  const matWire = new THREE.MeshBasicMaterial({
    color: GREEN, wireframe: true, transparent: true, opacity: 0.55
  });
  const matEdge = new THREE.LineBasicMaterial({
    color: GREEN, transparent: true, opacity: 0.85
  });
  const matFace = new THREE.MeshBasicMaterial({
    color: GREEN, transparent: true, opacity: 0.06, side: THREE.FrontSide
  });
  const matScreen = new THREE.MeshBasicMaterial({
    color: 0x003300, transparent: true, opacity: 0.75
  });
  const matScreenGlow = new THREE.MeshBasicMaterial({
    color: GREEN2, transparent: true, opacity: 0.18
  });

  /* --- Groupe principal --- */
  const phone = new THREE.Group();
  scene3.add(phone);

  /* Corps du téléphone */
  const bodyGeo  = new THREE.BoxGeometry(0.55, 1.1, 0.07, 4, 8, 2);
  const bodyWire = new THREE.Mesh(bodyGeo, matWire);
  const bodyFace = new THREE.Mesh(bodyGeo, matFace);
  const bodyEdge = new THREE.LineSegments(new THREE.EdgesGeometry(bodyGeo), matEdge);
  phone.add(bodyFace, bodyWire, bodyEdge);

  /* Écran */
  const scrGeo  = new THREE.PlaneGeometry(0.38, 0.62, 3, 6);
  const scrMesh = new THREE.Mesh(scrGeo, matScreen);
  scrMesh.position.set(0, 0.08, 0.037);
  phone.add(scrMesh);

  /* Scanlines sur l'écran */
  const linesMat = new THREE.LineBasicMaterial({color:GREEN, transparent:true, opacity:0.22});
  const linesPts = [];
  for(let i=0;i<12;i++){
    const y = -0.28 + i*(0.62/11);
    linesPts.push(new THREE.Vector3(-0.19, y, 0.038));
    linesPts.push(new THREE.Vector3( 0.19, y, 0.038));
  }
  const linesGeo = new THREE.BufferGeometry().setFromPoints(linesPts);
  phone.add(new THREE.LineSegments(linesGeo, linesMat));

  /* Encoche caméra */
  const notchGeo = new THREE.CylinderGeometry(0.035, 0.035, 0.012, 12);
  const notchMat = new THREE.MeshBasicMaterial({color:GREEN, transparent:true, opacity:0.7});
  const notch    = new THREE.Mesh(notchGeo, notchMat);
  notch.rotation.x = Math.PI/2;
  notch.position.set(0, 0.47, 0.038);
  phone.add(notch);

  /* Bouton home */
  const homeGeo = new THREE.RingGeometry(0.04, 0.065, 16);
  const homeMat = new THREE.MeshBasicMaterial({color:GREEN, transparent:true, opacity:0.6, side:THREE.DoubleSide});
  const home    = new THREE.Mesh(homeGeo, homeMat);
  home.position.set(0, -0.44, 0.038);
  phone.add(home);

  /* Anneau orbital qui tourne autour du téléphone */
  const ringGeo = new THREE.TorusGeometry(0.75, 0.008, 6, 60);
  const ringMat = new THREE.MeshBasicMaterial({color:GREEN, transparent:true, opacity:0.35});
  const ring1   = new THREE.Mesh(ringGeo, ringMat);
  ring1.rotation.x = Math.PI/2;
  scene3.add(ring1);

  const ring2 = ring1.clone();
  ring2.rotation.set(Math.PI/3, 0, Math.PI/4);
  ring2.material = ringMat.clone();
  ring2.material.opacity = 0.2;
  scene3.add(ring2);

  /* Particule orbitale */
  const dotGeo = new THREE.SphereGeometry(0.035, 8, 8);
  const dotMat = new THREE.MeshBasicMaterial({color:GREEN});
  const dot1   = new THREE.Mesh(dotGeo, dotMat);
  const dot2   = new THREE.Mesh(dotGeo, dotMat.clone());
  scene3.add(dot1, dot2);

  /* Lumière point (pour depth) */
  scene3.add(new THREE.PointLight(GREEN, 1.2, 8));

  let t = 0;
  function animate(){
    requestAnimationFrame(animate);
    t += 0.012;

    /* Rotation multi-axes lente et fluide */
    phone.rotation.y = t * 0.7;
    phone.rotation.x = Math.sin(t * 0.31) * 0.32;
    phone.rotation.z = Math.sin(t * 0.19) * 0.10;

    /* Scanlines qui défilent : déplace légèrement le mesh */
    scrMesh.position.y = 0.08 + Math.sin(t * 2.1) * 0.002;

    /* Anneaux qui tournent */
    ring1.rotation.z = t * 0.4;
    ring2.rotation.y = t * 0.55;

    /* Dot orbital sur ring1 */
    dot1.position.set(
      Math.cos(t * 0.8) * 0.75,
      Math.sin(t * 0.8) * 0.75 * Math.cos(ring1.rotation.x),
      Math.sin(t * 0.8) * 0.75 * Math.sin(ring1.rotation.x)
    );
    dot2.position.set(
      Math.cos(t * 0.55 + Math.PI) * 0.75,
      Math.sin(t * 0.55 + Math.PI) * 0.4,
      0
    );

    /* Pulsation opacity */
    const pulse = 0.5 + 0.5 * Math.sin(t * 1.8);
    matWire.opacity   = 0.35 + 0.2  * pulse;
    matEdge.opacity   = 0.7  + 0.15 * pulse;
    ring1.material.opacity = 0.25 + 0.15 * pulse;
    linesMat.opacity  = 0.15 + 0.12 * pulse;

    renderer.render(scene3, camera);
  }
  animate();
})();
</script>
</body>
</html>
