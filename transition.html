<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chargement...</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
#map{position:fixed;inset:0;z-index:1;opacity:0;}
.vignette{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,0.92) 100%);}
.scanlines{position:fixed;inset:0;z-index:3;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.07) 0px,rgba(0,0,0,0.07) 1px,transparent 1px,transparent 3px);}
.flash{position:fixed;inset:0;z-index:10;background:#fff;opacity:0;pointer-events:none;transition:opacity 0.5s;}
.blackout{position:fixed;inset:0;z-index:20;background:#000;opacity:0;pointer-events:none;}
.hud{position:fixed;top:24px;left:24px;z-index:8;font-family:'Courier New',monospace;font-size:12px;color:rgba(0,255,0,0.75);opacity:0;line-height:2;transition:opacity 0.6s;}
.hud-right{position:fixed;top:24px;right:24px;z-index:8;font-family:'Courier New',monospace;font-size:12px;color:rgba(0,255,0,0.5);opacity:0;line-height:2;text-align:right;transition:opacity 0.6s;}
.crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:7;opacity:0;pointer-events:none;transition:opacity 0.5s;}
.crosshair svg{width:140px;height:140px;}
.sonar{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:6;pointer-events:none;}
.ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;border:2px solid #00ff00;opacity:0;box-shadow:0 0 12px #00ff00;}
.alt-bar{position:fixed;right:24px;bottom:80px;z-index:8;width:6px;height:200px;background:rgba(0,255,0,0.1);border:1px solid rgba(0,255,0,0.3);opacity:0;transition:opacity 0.5s;border-radius:3px;overflow:hidden;}
.alt-fill{position:absolute;bottom:0;width:100%;background:#00ff00;box-shadow:0 0 8px #00ff00;transition:height 0.3s;border-radius:3px;}
.store-label{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:8;text-align:center;opacity:0;font-family:'Arial Black',sans-serif;white-space:nowrap;transition:opacity 0.8s;}
.store-label .name{font-size:clamp(26px,4.5vw,50px);font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:5px;text-shadow:0 0 40px rgba(0,255,0,0.9),0 0 80px rgba(0,255,0,0.4),2px 2px 0 #000,-2px -2px 0 #000;display:block;}
.store-label .city{font-size:clamp(13px,1.8vw,18px);color:#00ff00;letter-spacing:5px;text-transform:uppercase;text-shadow:0 0 20px #00ff00;display:block;margin-top:8px;}
.store-label .bar{display:block;width:0%;height:2px;background:linear-gradient(to right,transparent,#00ff00,transparent);box-shadow:0 0 12px #00ff00;margin:14px auto 0;transition:width 1.2s cubic-bezier(.4,0,.2,1);}
.loading-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:8;width:260px;text-align:center;opacity:0;transition:opacity 0.5s;}
.loading-wrap .lbl{font-family:'Courier New',monospace;font-size:10px;color:#555;letter-spacing:4px;text-transform:uppercase;margin-bottom:8px;}
.loading-track{width:100%;height:1px;background:rgba(255,255,255,0.08);overflow:hidden;}
.loading-fill{height:100%;width:0%;background:#00ff00;box-shadow:0 0 6px #00ff00;transition:width 0.12s linear;}
.zoom-lbl{position:fixed;left:24px;bottom:80px;z-index:8;font-family:'Courier New',monospace;font-size:11px;color:rgba(0,255,0,0.5);opacity:0;transition:opacity 0.5s;}
</style>
</head>
<body>
<div id="map"></div>
<div class="vignette"></div>
<div class="scanlines"></div>
<div class="flash" id="flash"></div>
<div class="blackout" id="blackout"></div>
<div class="crosshair" id="crosshair">
  <svg viewBox="0 0 100 100" fill="none">
    <circle cx="50" cy="50" r="44" stroke="#00ff00" stroke-width="1" stroke-dasharray="6 3" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="50" r="30" stroke="#00ff00" stroke-width="0.6" opacity="0.3">
      <animateTransform attributeName="transform" type="rotate" from="360 50 50" to="0 50 50" dur="10s" repeatCount="indefinite"/>
    </circle>
    <line x1="50" y1="2" x2="50" y2="22" stroke="#00ff00" stroke-width="1.5"/>
    <line x1="50" y1="78" x2="50" y2="98" stroke="#00ff00" stroke-width="1.5"/>
    <line x1="2" y1="50" x2="22" y2="50" stroke="#00ff00" stroke-width="1.5"/>
    <line x1="78" y1="50" x2="98" y2="50" stroke="#00ff00" stroke-width="1.5"/>
    <circle cx="50" cy="50" r="3.5" fill="#00ff00"/>
    <circle cx="50" cy="50" r="3.5" fill="#00ff00" opacity="0.4">
      <animate attributeName="r" values="3.5;10;3.5" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="54" y="16" fill="#00ff00" font-size="5.5" font-family="Courier New" opacity="0.7">N</text>
    <text x="54" y="97" fill="#00ff00" font-size="5.5" font-family="Courier New" opacity="0.5">S</text>
    <text x="4" y="53" fill="#00ff00" font-size="5.5" font-family="Courier New" opacity="0.5">W</text>
    <text x="88" y="53" fill="#00ff00" font-size="5.5" font-family="Courier New" opacity="0.5">E</text>
  </svg>
</div>
<div class="sonar" id="sonar"></div>
<div class="hud" id="hud">
  <span id="hud-lat">LAT  ---.------</span>
  <span id="hud-lng">LNG  ---.------</span>
  <span id="hud-alt">ALT  ------  m</span>
  <span id="hud-spd">SPD  ---  km/h</span>
  <span id="hud-sig" style="margin-top:6px;color:rgba(0,255,0,0.35)">SIG  ████████░░</span>
</div>
<div class="hud-right" id="hud-right">
  <span id="hud-zoom">ZOOM  --</span>
  <span id="hud-acc">ACC  ±--- m</span>
  <span id="hud-sat">SAT  --/--</span>
</div>
<div class="alt-bar" id="alt-bar"><div class="alt-fill" id="alt-fill" style="height:100%"></div></div>
<div class="zoom-lbl" id="zoom-lbl">ORBITAL VIEW</div>
<div class="store-label" id="store-label">
  <span class="name" id="lbl-name"></span>
  <span class="city" id="lbl-city"></span>
  <span class="bar" id="lbl-bar"></span>
</div>
<div class="loading-wrap" id="loading-wrap">
  <div class="lbl" id="loading-lbl">Acquisition satellite</div>
  <div class="loading-track"><div class="loading-fill" id="loading-fill"></div></div>
</div>

<script>
const stores={
  cigphone:  {name:"Cig & Phone",    city:"Pornic (44210)",                      lat:47.11531349438508, lng:-2.0978172850793193, url:"home-cig-phone.html"},
  sosinfo:   {name:"SOS Info.Mobile",city:"Saint-Philbert-de-Grand-Lieu (44310)",lat:47.039391,          lng:-1.641182,           url:"home-sos-mobile.html"},
  smartelier:{name:"Le Smart'elier", city:"Machecoul-Saint-M\u00eame (44270)",    lat:46.992412232848764, lng:-1.820071743570542,  url:"home-le-smartelier.html"}
};
const key=new URLSearchParams(window.location.search).get('to')||'cigphone';
const store=stores[key]||stores.cigphone;
document.getElementById('lbl-name').textContent=store.name;
document.getElementById('lbl-city').textContent='\uD83D\uDCCD '+store.city;

const $=id=>document.getElementById(id);
const mapEl=$('map');

const map=L.map('map',{center:[store.lat,store.lng],zoom:3,zoomControl:false,attributionControl:false,dragging:false,scrollWheelZoom:false,doubleClickZoom:false,keyboard:false,zoomAnimation:false,fadeAnimation:false,markerZoomAnimation:false});
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19,keepBuffer:6}).addTo(map);

const sleep=ms=>new Promise(r=>setTimeout(r,ms));

async function zoomTo(z,fadeDur,label){
  if(label)$('zoom-lbl').textContent=label;
  mapEl.style.transition=`opacity ${fadeDur*0.38}ms ease`;
  mapEl.style.opacity='0';
  await sleep(fadeDur*0.38);
  map.setZoom(z,{animate:false});
  await sleep(60);
  mapEl.style.transition=`opacity ${fadeDur*0.62}ms ease`;
  mapEl.style.opacity='1';
  await sleep(fadeDur*0.62);
}

async function shake(times,intensity){
  for(let i=0;i<times;i++){const dx=(Math.random()-.5)*intensity,dy=(Math.random()-.5)*intensity;mapEl.style.transform=`translate(${dx}px,${dy}px)`;await sleep(35);}mapEl.style.transform='';}

function fireSonar(count=3){
  const el=$('sonar');
  for(let i=0;i<count;i++){setTimeout(()=>{const r=document.createElement('div');r.className='ring';r.style.cssText='width:20px;height:20px;';el.appendChild(r);let s=20,o=1;const a=setInterval(()=>{s+=16;o-=0.04;r.style.width=s+'px';r.style.height=s+'px';r.style.opacity=Math.max(0,o);if(o<=0){clearInterval(a);r.remove();}},16);},i*200);}
}

const actx=new (window.AudioContext||window.webkitAudioContext)();
function beep(freq=880,vol=0.08,dur=0.22){const o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=freq;g.gain.setValueAtTime(0,actx.currentTime);g.gain.linearRampToValueAtTime(vol,actx.currentTime+0.04);g.gain.linearRampToValueAtTime(0,actx.currentTime+dur);o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+dur+0.02);}
function beepLock(){beep(660,0.06,0.1);setTimeout(()=>beep(880,0.1,0.18),120);setTimeout(()=>beep(1100,0.12,0.3),260);}

let hudTimer,altPct=100,phaseIdx=0;
const phases=[
  {zoom:'3', acc:'±48000 m',sat:'4/12'},
  {zoom:'9', acc:'±2400 m', sat:'8/12'},
  {zoom:'15',acc:'±30 m',   sat:'11/12'},
  {zoom:'18',acc:'±2 m',    sat:'12/12'},
];
function startHud(){
  let alt=42000,spd=2800;
  hudTimer=setInterval(()=>{
    const p=phases[Math.min(phaseIdx,phases.length-1)];
    alt=Math.max(8,alt*0.91+Math.random()*40-20);
    spd=Math.max(0,spd*0.89+Math.random()*25-12);
    altPct=Math.max(2,altPct-1.4);
    $('hud-lat').textContent='LAT  '+(store.lat+(Math.random()-.5)*0.0004*(alt/200)).toFixed(6);
    $('hud-lng').textContent='LNG  '+(store.lng+(Math.random()-.5)*0.0004*(alt/200)).toFixed(6);
    $('hud-alt').textContent='ALT  '+Math.round(alt).toString().padStart(6)+' m';
    $('hud-spd').textContent='SPD  '+Math.round(spd).toString().padStart(4)+' km/h';
    $('hud-zoom').textContent='ZOOM  '+p.zoom;
    $('hud-acc').textContent='ACC  '+p.acc;
    $('hud-sat').textContent='SAT  '+p.sat;
    $('alt-fill').style.height=altPct+'%';
  },120);
}

async function run(){
  actx.resume();
  await sleep(300);
  mapEl.style.transition='opacity 0.9s ease';
  mapEl.style.opacity='1';
  $('hud').style.opacity='1';
  $('hud-right').style.opacity='1';
  $('crosshair').style.opacity='1';
  $('loading-wrap').style.opacity='1';
  $('alt-bar').style.opacity='1';
  $('zoom-lbl').style.opacity='1';
  startHud();
  beep(440,0.05,0.4);

  let loadPct=0;
  const fillLoad=(target,dur)=>{const step=(target-loadPct)/(dur/70);return new Promise(r=>{const t=setInterval(()=>{loadPct=Math.min(target,loadPct+step);$('loading-fill').style.width=loadPct+'%';if(loadPct>=target){clearInterval(t);r();}},70);});};

  $('loading-lbl').textContent='Acquisition satellite';
  await fillLoad(28,600);
  await sleep(300);
  phaseIdx=1;
  $('loading-lbl').textContent='Triangulation GPS';
  beep(600,0.05,0.14);
  await zoomTo(9,600,'REGIONAL VIEW');
  await fillLoad(50,500);
  await shake(4,3);
  fireSonar(2);

  await sleep(300);
  phaseIdx=2;
  $('loading-lbl').textContent='Approche finale';
  beep(800,0.07,0.14);
  await zoomTo(15,580,'STREET VIEW');
  await fillLoad(78,450);
  await shake(6,5);
  fireSonar(3);

  await sleep(250);
  phaseIdx=3;
  $('loading-lbl').textContent='Verrouillage cible';
  beep(1000,0.08,0.14);
  await zoomTo(18,550,'TARGET LOCKED');
  await fillLoad(100,350);
  await shake(8,6);
  fireSonar(5);
  beepLock();

  await sleep(400);
  clearInterval(hudTimer);
  $('store-label').style.opacity='1';
  await sleep(100);
  $('lbl-bar').style.width='100%';
  await sleep(1800);

  $('flash').style.opacity='1';
  await sleep(80);
  $('flash').style.opacity='0';
  await sleep(250);
  $('blackout').style.transition='opacity 0.5s';
  $('blackout').style.opacity='1';
  await sleep(550);
  window.location.href=store.url;
}
run();
</script>
</body>
</html>
