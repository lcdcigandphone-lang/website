<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cig & Phone — Choisissez votre boutique</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Satisfy&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--g:#00ff00;--gg:rgba(0,255,0,.35);--dc:#121214;}
html,body{height:100%;overflow:hidden;}
body{background:var(--dc);color:#fff;font-family:'Poppins',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;}

.grid{position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,0,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,0,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.scanline{position:fixed;top:0;left:0;width:100%;height:4px;background:linear-gradient(to right,transparent,var(--g),transparent);box-shadow:0 0 14px var(--g);animation:scan 7s linear infinite;opacity:.55;z-index:0;}

.top{position:relative;z-index:10;text-align:center;margin-bottom:20px;}
.top img{width:280px;max-width:75vw;}
.top h1{font-size:clamp(13px,2vw,17px);font-weight:600;color:#888;letter-spacing:3px;text-transform:uppercase;margin-top:8px;}
.top h1 span{color:var(--g);text-shadow:0 0 10px var(--g);}

.scene{position:relative;z-index:10;width:min(900px,96vw);height:min(560px,65vh);perspective:1400px;cursor:grab;}
.scene:active{cursor:grabbing;}
.wheel{width:100%;height:100%;position:relative;transform-style:preserve-3d;animation:autoSpin 22s linear infinite;}

.card{
  position:absolute;
  width:clamp(240px,28vw,320px);
  height:clamp(340px,48vh,460px);
  top:50%;left:50%;
  border-radius:24px;
  overflow:hidden;
  border:2px solid #2a2a2a;
  transition:border-color .3s,box-shadow .3s;
  text-decoration:none;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding:28px 22px;
  background-size:cover;background-position:center;
}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9) 30%,rgba(0,0,0,.15));z-index:1;}
.card:hover{border-color:var(--g);box-shadow:0 0 45px var(--gg);}

.card-1{transform:translate(-50%,-50%) rotateY(0deg)   translateZ(clamp(260px,30vw,360px));}
.card-2{transform:translate(-50%,-50%) rotateY(120deg) translateZ(clamp(260px,30vw,360px));}
.card-3{transform:translate(-50%,-50%) rotateY(240deg) translateZ(clamp(260px,30vw,360px));}

.card-1{background-image:url('cig--phone-pornic-reparationtelephone.jpg');}
.card-2{background-image:url('20260520_184840.jpg');}
.card-3{background-image:url('atelier.jpeg');}

.card-inner{position:relative;z-index:2;text-align:center;width:100%;}
.card-inner h2{font-size:clamp(18px,2.2vw,24px);font-weight:800;text-transform:uppercase;color:#fff;line-height:1.2;text-shadow:0 2px 10px rgba(0,0,0,.9);}
.card-inner .city{font-size:13px;color:#bbb;margin-top:6px;letter-spacing:1px;}
.card-inner .btn-go{
  display:inline-block;margin-top:16px;
  background:var(--g);color:#000;
  font-size:13px;font-weight:800;
  padding:10px 28px;border-radius:30px;
  text-transform:uppercase;letter-spacing:2px;
  box-shadow:0 0 18px var(--gg);
  transition:transform .2s,box-shadow .2s;
}
.card:hover .btn-go{transform:scale(1.07);box-shadow:0 0 30px var(--g);}

.hub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:90px;height:90px;border-radius:50%;background:var(--dc);border:2px solid var(--g);box-shadow:0 0 25px var(--gg),inset 0 0 15px rgba(0,255,0,.08);display:flex;align-items:center;justify-content:center;z-index:30;}
.hub img{width:58px;height:58px;object-fit:contain;border-radius:50%;}

.hint{position:relative;z-index:10;margin-top:18px;font-size:12px;color:#555;letter-spacing:2px;text-transform:uppercase;animation:blink 2.5s infinite;}

@keyframes scan{0%{top:0}50%{top:100%}100%{top:0}}
@keyframes autoSpin{from{transform:rotateY(0deg)}to{transform:rotateY(360deg)}}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}

@media(max-width:600px){
  .card{width:180px;height:280px;padding:18px 14px;}
  .card-1{transform:translate(-50%,-50%) rotateY(0deg)   translateZ(200px);}
  .card-2{transform:translate(-50%,-50%) rotateY(120deg) translateZ(200px);}
  .card-3{transform:translate(-50%,-50%) rotateY(240deg) translateZ(200px);}
  .card-inner h2{font-size:15px;}
  .hub{width:65px;height:65px;}.hub img{width:42px;}
  .scene{height:58vh;}
  .top img{width:200px;}
}
</style>
</head>
<body>
<div class="grid"></div>
<div class="scanline"></div>

<div class="top">
  <img src="cigandphone-pornic (3).png" alt="Logo">
  <h1>Choisissez votre <span>boutique</span></h1>
</div>

<div class="scene" id="scene">
  <div class="wheel" id="wheel">

    <a href="index.html" class="card card-1">
      <div class="card-inner">
        <h2>Cig &amp; Phone</h2>
        <div class="city">📍 Pornic</div>
        <span class="btn-go">Y aller →</span>
      </div>
    </a>

    <a href="sos-info-mobile.html" class="card card-2">
      <div class="card-inner">
        <h2>SOS Info.Mobile</h2>
        <div class="city">📍 Saint-Philbert</div>
        <span class="btn-go">Y aller →</span>
      </div>
    </a>

    <a href="le-smartelier.html" class="card card-3">
      <div class="card-inner">
        <h2>Le Smart'elier</h2>
        <div class="city">📍 Machecoul</div>
        <span class="btn-go">Y aller →</span>
      </div>
    </a>

    <div class="hub">
      <img src="bulle.png" alt="Mascotte">
    </div>

  </div>
</div>

<p class="hint">↔ Faites tourner • Cliquez pour entrer</p>

<script>
const wheel = document.getElementById('wheel');
let drag=false,lastX=0,curAngle=0,vel=0,raf;
function readAngle(){const m=(wheel.style.transform||'').match(/rotateY\(([-\d.]+)deg\)/);return m?parseFloat(m[1]):0;}
function startDrag(x){drag=true;lastX=x;curAngle=readAngle();vel=0;cancelAnimationFrame(raf);wheel.style.animation='none';}
function moveDrag(x){if(!drag)return;const dx=x-lastX;vel=dx*.5;curAngle+=dx*.38;wheel.style.transform=`rotateY(${curAngle}deg)`;lastX=x;}
function endDrag(){if(!drag)return;drag=false;inertia();}
function inertia(){if(Math.abs(vel)<.05)return;vel*=.96;curAngle+=vel;wheel.style.transform=`rotateY(${curAngle}deg)`;raf=requestAnimationFrame(inertia);}
wheel.addEventListener('mousedown',e=>startDrag(e.clientX));
document.addEventListener('mousemove',e=>moveDrag(e.clientX));
document.addEventListener('mouseup',endDrag);
wheel.addEventListener('touchstart',e=>startDrag(e.touches[0].clientX),{passive:true});
document.addEventListener('touchmove',e=>moveDrag(e.touches[0].clientX),{passive:true});
document.addEventListener('touchend',endDrag);
</script>
</body>
</html>
